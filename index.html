<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Mesto</title>
    <script type="module" crossorigin src="./assets/index-BpDNZYD1.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-D727xYmf.css">
  </head>
  <body class="page">
    <div class="page__content">
      <header class="header page__section">
        <img
          src="./assets/logo-C_QQpFK1.svg"
          alt="Логотип проекта Mesto"
          class="logo header__logo"
        />
      </header>
      <main class="content">
        <section class="profile page__section">
          <div class="profile__image">
            <div class="profile__image-edit"></div>
          </div>
          <div class="profile__info">
            <h1 class="profile__title"></h1>
            <button class="profile__edit-button" type="button"></button>
            <p class="profile__description"></p>
          </div>
          <button class="profile__add-button" type="button"></button>
        </section>
        <section class="places page__section">
          <ul class="places__list"></ul>
        </section>
      </main>
      <footer class="footer page__section">
        <p class="footer__copyright">© 2023 Mesto Russia</p>
      </footer>

      <div class="popup popup_type_edit popup_is-animated">
        <div class="popup__content">
          <button type="button" class="popup__close"></button>
          <h3 class="popup__title">Редактировать профиль</h3>
          <form class="popup__form" name="edit-profile" novalidate>
            <input
              type="text"
              name="name"
              class="popup__input popup__input_type_name"
              id="profile-name"
              placeholder="Имя"
              minlength="2"
              maxlength="40"
              pattern="^[a-zA-Zа-яА-ЯёЁ\s\-]+$"
              data-error-message="Разрешены только латинские, кириллические буквы, знаки дефиса и пробелы"
              required
            />
            <span class="popup__error profile-name-error"></span>
            <input
              type="text"
              name="description"
              class="popup__input popup__input_type_description"
              id="profile-description"
              placeholder="Занятие"
              minlength="2"
              maxlength="200"
              required
            />
            <span class="popup__error profile-description-error"></span>
            <button
              type="submit"
              class="button popup__button popup__button_disabled"
              disabled
            >
              Сохранить
            </button>
          </form>
        </div>
      </div>

      <div class="popup popup_type_edit-avatar popup_is-animated">
        <div class="popup__content popup__content_content_avatar">
          <button type="button" class="popup__close"></button>
          <h3 class="popup__title">Обновить аватар</h3>
          <form class="popup__form" name="edit-avatar" novalidate>
            <input
              type="url"
              name="avatar"
              class="popup__input popup__input_type_avatar"
              id="avatar-link"
              placeholder="Ссылка на картинку"
              required
            />
            <span class="popup__error avatar-link-error"></span>
            <button
              type="submit"
              class="button popup__button popup__button_disabled"
              disabled
            >
              Сохранить
            </button>
          </form>
        </div>
      </div>

      <div class="popup popup_type_new-card popup_is-animated">
        <div class="popup__content">
          <button type="button" class="popup__close"></button>
          <h3 class="popup__title">Новое место</h3>
          <form class="popup__form" name="new-place" novalidate>
            <input
              type="text"
              name="place-name"
              class="popup__input popup__input_type_card-name"
              id="card-name"
              placeholder="Название"
              minlength="2"
              maxlength="30"
              pattern="^[a-zA-Zа-яА-ЯёЁ\s\-]+$"
              data-error-message="Разрешены только латинские, кириллические буквы, знаки дефиса и пробелы"
              required
            />
            <span class="popup__error card-name-error"></span>
            <input
              type="url"
              name="link"
              class="popup__input popup__input_type_url"
              id="card-link"
              placeholder="Ссылка на картинку"
              required
            />
            <span class="popup__error card-link-error"></span>
            <button
              type="submit"
              class="button popup__button popup__button_disabled"
              disabled
            >
              Создать
            </button>
          </form>
        </div>
      </div>

      <div class="popup popup_type_image popup_is-animated">
        <div class="popup__content popup__content_content_image">
          <button type="button" class="popup__close"></button>
          <img src="" alt="" class="popup__image" />
          <p class="popup__caption"></p>
        </div>
      </div>

      <div class="popup popup_type_remove-card popup_is-animated">
        <div class="popup__content">
          <button type="button" class="popup__close"></button>
          <h3 class="popup__title">Вы уверены?</h3>
          <form class="popup__form" name="remove-card" novalidate>
            <button type="submit" class="button popup__button">Да</button>
          </form>
        </div>
      </div>

      <div class="popup popup_type_info popup_is-animated">
        <div class="popup__content popup__content_info">
          <button type="button" class="popup__close"></button>
          <h3 class="popup__title">Статистика</h3>
          <ul class="popup__info-list"></ul>
          <h4 class="popup__info-subtitle">Участники</h4>
          <ul class="popup__info-user-list"></ul>
        </div>
      </div>
    </div>

    <template id="card-template">
      <li class="places__item card">
        <img class="card__image" src="" alt="" />
        <button type="button" class="card__delete-button"></button>
        <div class="card__description">
          <h2 class="card__title"></h2>
          <div class="card__like-block">
            <button type="button" class="card__like-button"></button>
            <span class="card__like-counter"></span>
          </div>
        </div>
      </li>
    </template>

    <template id="popup-info-definition-template">
      <li class="popup__info-item">
        <h4 class="popup__info-term"></h4>
        <p class="popup__info-definition"></p>
      </li>
    </template>

    <template id="popup-info-user-preview-template">
      <li class="popup__info-user">
        <img class="popup__info-user-avatar" src="" alt="" />
        <p class="popup__info-user-name"></p>
      </li>
    </template>

  </body>
</html>
